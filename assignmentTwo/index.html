<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic page metadata -->
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Explore the colourful world of M&M's chocolate candies, including popular flavours, fun facts and product information."
    >

    <meta
        name="keywords"
        content="M&M's, chocolate, candy, peanut, caramel, milk chocolate"
    >

    <meta name="author" content="Jasser Boulila">

    <title>M&M's | Colourful Chocolate Fun</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet"
    >

    <!-- External stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Website header and navigation -->
    <header class="main-header">
        <div class="header-container">

            <a href="#home" class="logo-link">
                <img
                    src="images/mms-logo.png"
                    alt="M&M's logo"
                    class="main-logo"
                >
            </a>

            <nav class="main-navigation" aria-label="Main navigation">
                <ul class="navigation-list">
                    <li>
                        <a href="#home">Home</a>
                    </li>

                    <li>
                        <a href="#about">About</a>
                    </li>

                    <li>
                        <a href="#flavours">Flavours</a>
                    </li>

                    <li>
                        <a href="#facts">Fun Facts</a>
                    </li>

                    <li>
                        <a href="#contact">Contact</a>
                    </li>
                </ul>
            </nav>

        </div>
    </header>
    <main>
        <!-- Hero section -->
        <section class="hero-section" id="home">
            <div class="hero-container">

                <div class="hero-content">
                    <p class="small-heading">
                        Colourful, crunchy and delicious
                    </p>

                    <h1>
                        Chocolate is more fun with
                        <span>M&M's</span>
                    </h1>

                    <p class="hero-description">
                        Discover colourful chocolate candies that bring
                        happiness, flavour and fun to every moment.
                    </p>

                    <div class="hero-buttons">
                        <a href="#flavours" class="button primary-button">
                            Explore Flavours
                        </a>

                        <a href="#about" class="button secondary-button">
                            Learn More
                        </a>
                    </div>
                </div>

                <div class="hero-image-container">
                    <div class="candy-circle red-circle">m</div>
                    <div class="candy-circle yellow-circle">m</div>
                    <div class="candy-circle blue-circle">m</div>

                    <img
                        src="images/mms-hero.png"
                        alt="A colourful collection of M&M's chocolate candies"
                        class="hero-image"
                    >
                </div>

            </div>

            <div class="wave-divider"></div>
        </section>


    </main>

   
</body>

</html>
